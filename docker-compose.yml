# Dobot CR ROS2 - Docker Compose
#
# Usage:
#   docker compose build              # Build the image
#   docker compose run dobot bash     # Interactive shell
#   docker compose up dobot-driver    # Start the driver (set ROBOT_IP first)

services:
  # Base service with common settings
  dobot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    network_mode: host  # Required to reach robot on local network
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/fastrtps_profile.xml
    volumes:
      # Mount dobot-ros code for live editing (no rebuild needed)
      - ./dobot-ros:/dobot-ros
      - ./docker/fastrtps_profile.xml:/fastrtps_profile.xml:ro
      - dobot-shared:/tmp/dobot-shared
    stdin_open: true
    tty: true

  # Driver service - connects to robot and exposes ROS2 services
  dobot-driver:
    extends: dobot
    restart: unless-stopped
    environment:
      - IP_address=${ROBOT_IP:-192.168.5.1}
      - DOBOT_TYPE=${ROBOT_TYPE:-cr5}
    command: >
      bash -c "
        rm -f /tmp/dobot-shared/driver_restart;
        while true; do
          ros2 launch cr_robot_ros2 dobot_bringup_ros2.launch.py &
          PID=$$!;
          while kill -0 $$PID 2>/dev/null; do
            if [ -f /tmp/dobot-shared/driver_restart ]; then
              echo 'Restart signal received — killing driver';
              rm -f /tmp/dobot-shared/driver_restart;
              kill $$PID 2>/dev/null;
              wait $$PID 2>/dev/null;
              break;
            fi;
            sleep 1;
          done;
          echo 'Driver exited, restarting in 2s...';
          sleep 2;
        done
      "

  # CLI service - for running dobot-ros commands
  dobot-cli:
    extends: dobot
    command: dobot-ros
    depends_on:
      - dobot-driver

  # Gripper node - owns Modbus connection, publishes state, accepts commands
  dobot-gripper:
    extends: dobot
    restart: unless-stopped
    command: python3 /dobot-ros/dobot_ros/gripper_node.py
    depends_on:
      - dobot-driver

  # Web dashboard - browser-based robot control
  dobot-web:
    extends: dobot
    restart: unless-stopped
    command: dobot-ros web --port 7070
    ports:
      - "7070:7070"

volumes:
  dobot-shared:
